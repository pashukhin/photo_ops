services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASS}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER}"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    volumes:
      - ../minio/create-bucket.sh:/create-bucket.sh:ro
    entrypoint: ["/bin/sh", "/create-bucket.sh"]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  photo-service:
    build:
      context: ../..
      dockerfile: apps/photo-service/Dockerfile
    environment:
      PHOTO_DATABASE_URL: ${PHOTO_DATABASE_URL}
      PHOTO_SERVICE_GRPC_PORT: ${PHOTO_SERVICE_GRPC_PORT}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_BROWSER_ENDPOINT: ${MINIO_BROWSER_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "3002:3002"
      - "50051:50051"

  api-gateway:
    build:
      context: ../..
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
      PHOTO_SERVICE_GRPC_URL: photo-service:${PHOTO_SERVICE_GRPC_PORT}
    depends_on:
      - photo-service
    ports:
      - "3001:3001"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"

  media-worker:
    build:
      context: ../..
      dockerfile: apps/media-worker/Dockerfile
    ports:
      - "3010:3010"

  cluster-service:
    build:
      context: ../..
      dockerfile: apps/cluster-service/Dockerfile
    ports:
      - "3011:3011"

  publication-service:
    build:
      context: ../..
      dockerfile: apps/publication-service/Dockerfile
    ports:
      - "3012:3012"

  usage-service:
    build:
      context: ../..
      dockerfile: apps/usage-service/Dockerfile
    ports:
      - "3013:3013"

  connector-service:
    build:
      context: ../..
      dockerfile: apps/connector-service/Dockerfile
    ports:
      - "3014:3014"

volumes:
  postgres-data:
  minio-data:
