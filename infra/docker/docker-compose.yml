services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASS}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER}"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    volumes:
      - ../minio/create-bucket.sh:/create-bucket.sh:ro
    entrypoint: ["/bin/sh", "/create-bucket.sh"]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  identity-service:
    build:
      context: ../..
      dockerfile: apps/identity-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL}
      IDENTITY_SERVICE_HTTP_PORT: ${IDENTITY_SERVICE_HTTP_PORT}
      IDENTITY_SERVICE_GRPC_PORT: ${IDENTITY_SERVICE_GRPC_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3005:3005"
      - "50055:50055"

  photo-service:
    build:
      context: ../..
      dockerfile: apps/photo-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PHOTO_DATABASE_URL: ${PHOTO_DATABASE_URL}
      PHOTO_SERVICE_GRPC_PORT: ${PHOTO_SERVICE_GRPC_PORT}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_BROWSER_ENDPOINT: ${MINIO_BROWSER_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      USAGE_PROVIDER: local-demo
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "3002:3002"
      - "50051:50051"

  api-gateway:
    build:
      context: ../..
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
      IDENTITY_SERVICE_GRPC_URL: identity-service:${IDENTITY_SERVICE_GRPC_PORT}
      IDENTITY_SESSION_COOKIE_NAME: ${IDENTITY_SESSION_COOKIE_NAME}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      WEB_ORIGIN: ${WEB_ORIGIN}
      PHOTO_SERVICE_GRPC_URL: photo-service:${PHOTO_SERVICE_GRPC_PORT}
      USAGE_SERVICE_GRPC_URL: usage-service:${USAGE_SERVICE_GRPC_PORT}
      CLUSTER_SERVICE_GRPC_URL: cluster-service:${CLUSTER_SERVICE_GRPC_PORT}
      PUBLICATION_SERVICE_GRPC_URL: publication-service:${PUBLICATION_SERVICE_GRPC_PORT}
    depends_on:
      - identity-service
      - photo-service
      - usage-service
      - cluster-service
      - publication-service
    ports:
      - "3001:3001"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      # Public origin for canonical /posts/<slug> links + og:url (020). Parity only:
      # NEXT_PUBLIC_* is build-time-inlined, so the code default is the effective
      # value unless the image is rebuilt with a build-arg (design D1).
      NEXT_PUBLIC_WEB_ORIGIN: ${NEXT_PUBLIC_WEB_ORIGIN:-http://localhost:3000}
      # Server-side (SSR) gateway URL for the public /posts/[slug] page (019).
      API_BASE_URL_INTERNAL: ${API_BASE_URL_INTERNAL:-http://api-gateway:3001}
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"

  media-worker:
    build:
      context: ../..
      dockerfile: apps/media-worker/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "3010:3010"

  cluster-service:
    build:
      context: ../..
      dockerfile: apps/cluster-service/Dockerfile
    command: ["python", "-m", "cluster_service.server_main"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CLUSTER_DATABASE_URL: ${CLUSTER_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      CLUSTER_SERVICE_GRPC_PORT: ${CLUSTER_SERVICE_GRPC_PORT}
      USAGE_PROVIDER: ${USAGE_PROVIDER:-local-demo}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${CLUSTER_SERVICE_GRPC_PORT}:${CLUSTER_SERVICE_GRPC_PORT}"

  cluster-worker:
    build:
      context: ../..
      dockerfile: apps/cluster-service/Dockerfile
    command: ["python", "-m", "cluster_service.worker_main"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CLUSTER_DATABASE_URL: ${CLUSTER_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PHOTO_SERVICE_GRPC_URL: photo-service:${PHOTO_SERVICE_GRPC_PORT}
      USAGE_PROVIDER: ${USAGE_PROVIDER:-local-demo}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      photo-service:
        condition: service_started

  publication-service:
    build:
      context: ../..
      dockerfile: apps/publication-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PUBLICATION_DATABASE_URL: ${PUBLICATION_DATABASE_URL}
      PUBLICATION_SERVICE_GRPC_PORT: ${PUBLICATION_SERVICE_GRPC_PORT}
      CLUSTER_SERVICE_GRPC_URL: cluster-service:${CLUSTER_SERVICE_GRPC_PORT}
      # post_published usage emit (session 019). The publisher connects lazily and
      # is non-throwing at boot — the broker is NOT a boot dependency; depends_on
      # only orders startup.
      RABBITMQ_URL: ${RABBITMQ_URL}
      USAGE_PROVIDER: ${USAGE_PROVIDER:-local-demo}
    depends_on:
      postgres:
        condition: service_healthy
      cluster-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "${PUBLICATION_SERVICE_GRPC_PORT}:${PUBLICATION_SERVICE_GRPC_PORT}"

  usage-service:
    build:
      context: ../..
      dockerfile: apps/usage-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      USAGE_DATABASE_URL: ${USAGE_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      USAGE_SERVICE_GRPC_PORT: ${USAGE_SERVICE_GRPC_PORT}
      USAGE_PROVIDER: ${USAGE_PROVIDER:-local-demo}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${USAGE_SERVICE_GRPC_PORT}:${USAGE_SERVICE_GRPC_PORT}"

  connector-service:
    build:
      context: ../..
      dockerfile: apps/connector-service/Dockerfile
    ports:
      - "3014:3014"

volumes:
  postgres-data:
  minio-data:
