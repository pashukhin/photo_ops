version: v2
managed:
  enabled: true
plugins:
  # Pin the plugin version: an unpinned remote floats to latest, so an upstream
  # release (v2.11.8 -> v2.12.0) rewrites the version-comment header and the CI
  # proto-drift check goes red on unrelated PRs. Pinned to the version the
  # committed packages/proto-ts artifacts were generated with.
  - remote: buf.build/community/stephenh-ts-proto:v2.11.8
    out: ../packages/proto-ts/src
    opt:
      - nestJs=true
      - outputServices=grpc-js
      - esModuleInterop=true
      - forceLong=string
      - useExactTypes=false
