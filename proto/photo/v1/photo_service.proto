syntax = "proto3";

package photoops.photo.v1;

import "common/v1/common.proto";
import "google/api/annotations.proto";

service PhotoService {
  rpc Health(photoops.common.v1.HealthCheckRequest) returns (photoops.common.v1.HealthCheckResponse) {
    option (google.api.http) = {get: "/v1/photo/health"};
  }

  rpc CreateUploadIntent(CreateUploadIntentRequest) returns (CreateUploadIntentResponse) {
    option (google.api.http) = {
      post: "/v1/photos/upload-intents"
      body: "*"
    };
  }

  rpc CompleteUpload(CompleteUploadRequest) returns (PhotoAsset) {
    option (google.api.http) = {
      post: "/v1/photos/{photo_id}/complete-upload"
      body: "*"
    };
  }

  rpc ListPhotos(ListPhotosRequest) returns (ListPhotosResponse) {
    option (google.api.http) = {get: "/v1/photos"};
  }

  rpc GetPhoto(GetPhotoRequest) returns (PhotoAsset) {
    option (google.api.http) = {get: "/v1/photos/{photo_id}"};
  }
}

message CreateUploadIntentRequest {
  string filename = 1;
  string content_type = 2;
  string size_bytes = 3;
  string user_id = 4;
}

message CreateUploadIntentResponse {
  string photo_id = 1;
  string object_key = 2;
  string upload_url = 3;
  string expires_at = 4;
}

message CompleteUploadRequest {
  string photo_id = 1;
  string user_id = 2;
}

message ListPhotosRequest {
  int32 page_size = 1;
  string page_token = 2;
  string user_id = 3;
}

message ListPhotosResponse {
  repeated PhotoAsset photos = 1;
  string next_page_token = 2;
}

message GetPhotoRequest {
  string photo_id = 1;
  string user_id = 2;
}

// A generated variant rendition surfaced to the UI, with a short-lived,
// owner-scoped presigned GET url.
message PhotoVariantView {
  string variant_type = 1; // "thumbnail" | "preview"
  string url = 2;
  uint32 width = 3;
  uint32 height = 4;
}

message PhotoAsset {
  string id = 1;
  string filename = 2;
  string content_type = 3;
  string size_bytes = 4;
  string object_key = 5;
  PhotoStatus status = 6;
  string created_at = 7;
  string updated_at = 8;
  string user_id = 9;
  // Extracted attributes (populated after processing; defaults/absent before).
  uint32 width = 10;
  uint32 height = 11;
  string taken_at_local = 12;     // tz-less wall-clock; "" if absent
  string taken_at_utc = 13;       // explicit-UTC ISO instant; "" if unresolved
  string taken_at_tz_source = 14; // exif_offset | gps_time | unknown
  string camera_make = 15;
  string camera_model = 16;
  uint32 orientation = 17;        // EXIF 1..8; 0 = absent
  optional double lat = 18;
  optional double lon = 19;
  repeated PhotoVariantView variants = 20;
}

enum PhotoStatus {
  PHOTO_STATUS_UNSPECIFIED = 0;
  PHOTO_STATUS_UPLOADING = 1;
  PHOTO_STATUS_UPLOADED = 2;
  PHOTO_STATUS_PROCESSING = 3;
  PHOTO_STATUS_READY = 4;
  PHOTO_STATUS_FAILED = 5;
}
