name: CI

on:
  push:
    # Tracker-only commits (beads export) must not burn a gate run.
    paths-ignore:
      - '.beads/**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Proto generation + drift check
        run: make proto-check

      - name: Typecheck
        run: make typecheck

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Test (vitest + contract smoke)
        run: make test

  media-worker:
    name: media-worker Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/media-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Proto stubs are committed (Task 0.2); no buf/regeneration needed here.
      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: python -m pytest -q

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy src
