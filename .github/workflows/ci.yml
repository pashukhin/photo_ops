name: CI

on:
  push:
    # Tracker-only commits (beads export) must not burn a gate run.
    paths-ignore:
      - '.beads/**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Proto generation + drift check
        run: make proto-check

      - name: Typecheck
        run: make typecheck

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Test (vitest + contract smoke)
        run: make test

  media-worker:
    name: media-worker Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/media-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Proto stubs are committed (Task 0.2); no buf/regeneration needed here.
      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: python -m pytest -q

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy src

  cluster-service:
    name: cluster-service Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cluster-service
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Proto stubs are committed; no buf/regeneration needed here.
      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: python -m pytest -q

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy src

  usage-service:
    name: usage-service Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/usage-service
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.2.2

      - name: Lint (golangci-lint)
        run: GOTOOLCHAIN=local golangci-lint run ./...

      - name: Test
        run: go test ./...

  coverage-gate:
    name: Coverage gate (new-code 100%)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Coverage gate
        env:
          COVERAGE_BASE: ${{ github.event.pull_request.base.sha }}
        run: make coverage-gate

  test-guard:
    name: Test-integrity guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bootstrap venv + self-test
        run: make test-guard-selftest

      - name: Test-integrity guard
        env:
          GUARD_BASE: ${{ github.event.pull_request.base.sha }}
        run: make test-guard
